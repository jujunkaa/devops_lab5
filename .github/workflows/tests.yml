name: Test Python App
on:
  push:
    branches: ['dev']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: RunTests
        run: python -m pytest tests/
